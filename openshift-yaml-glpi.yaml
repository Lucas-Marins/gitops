apiVersion: apps/v1
kind: Deployment
metadata:
  name: glpi-mariadb
spec:
  replicas: 1
  selector:
    matchLabels:
      app: glpi-mariadb
  template:
    metadata:
      labels:
        app: glpi-mariadb
    spec:
      containers:
      - name: mariadb
        image: docker.io/library/mariadb:10.11
        env:
        - name: MYSQL_ROOT_PASSWORD
          value: glpirootpass
        - name: MYSQL_DATABASE
          value: glpi
        - name: MYSQL_USER
          value: glpi
        - name: MYSQL_PASSWORD
          value: glpipass
        ports:
        - containerPort: 3306
        volumeMounts:
        - name: mariadb-data
          mountPath: /var/lib/mysql
      volumes:
      - name: mariadb-data
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: glpi-mariadb
spec:
  selector:
    app: glpi-mariadb
  ports:
  - port: 3306
    targetPort: 3306
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: glpi
  namespace: glpi-lab
spec:
  replicas: 1
  selector:
    matchLabels:
      app: glpi
  template:
    metadata:
      labels:
        app: glpi
    spec:
      containers:
      - name: glpi
        image: docker.io/glpi/glpi:latest
        env:
        - name: GLPI_DB_HOST
          value: glpi-mariadb
        - name: GLPI_DB_PORT
          value: "3306"
        - name: GLPI_DB_NAME
          value: glpi
        - name: GLPI_DB_USER
          value: glpi
        - name: GLPI_DB_PASSWORD
          value: glpipass
        ports:
        - containerPort: 80
        volumeMounts:
        - name: glpi-data
          mountPath: /var/glpi
      volumes:
      - name: glpi-data
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: glpi
  namespace: glpi-lab
spec:
  selector:
    app: glpi
  ports:
  - port: 80
    targetPort: 80