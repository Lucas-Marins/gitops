- name: Snapshot das VMs no OpenShift Virtualization
  hosts: localhost
  gather_facts: no

  tasks:

    - name: Gerar timestamp único
      ansible.builtin.set_fact:
        snapshot_suffix: "{{ lookup('pipe', 'date +%Y%m%d%H%M%S') }}"

    - name: Criar snapshot das VMs
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: snapshot.kubevirt.io/v1beta1
          kind: VirtualMachineSnapshot
          metadata:
            name: "{{ vm_name }}-snapshot-{{ snapshot_suffix }}"
            namespace: linuxvm
          spec:
            source:
              apiGroup: kubevirt.io
              kind: VirtualMachine
              name: "{{ vm_name }}"
      loop: "{{ groups['namespace_linuxvm'] }}"
      loop_control:
        label: "{{ item }}"
      vars:
        vm_name: "{{ item | regex_replace('^linuxvm-', '') }}"

    - name: Aguardar snapshot ficar pronto
      kubernetes.core.k8s_info:
        api_version: snapshot.kubevirt.io/v1beta1
        kind: VirtualMachineSnapshot
        name: "{{ vm_name }}-snapshot-{{ snapshot_suffix }}"
        namespace: linuxvm
      register: snapshot_status
      until: >
        snapshot_status.resources is defined and
        snapshot_status.resources | length > 0 and
        snapshot_status.resources[0].status.readyToUse | default(false)
      retries: 20
      delay: 15
      loop: "{{ groups['namespace_linuxvm'] }}"
      loop_control:
        label: "{{ item }}"
      vars:
        vm_name: "{{ item | regex_replace('^linuxvm-', '') }}"


---

- name: Patch das VMs e coleta de dados
  hosts: all
  become: yes
  gather_facts: yes

  tasks:

    - name: Listar updates disponíveis (ANTES)
      ansible.builtin.command: dnf check-update
      register: updates_before
      ignore_errors: true

    - name: Atualizar pacotes
      ansible.builtin.dnf:
        name: "*"
        state: latest
      register: dnf_result

    - name: Listar updates disponíveis (DEPOIS)
      ansible.builtin.command: dnf check-update
      register: updates_after
      ignore_errors: true

    - name: Verificar reboot necessário
      ansible.builtin.command: needs-restarting -r
      register: reboot_required
      ignore_errors: true
      changed_when: reboot_required.rc != 0

    - name: Reboot se necessário
      ansible.builtin.reboot:
        reboot_timeout: 600
      when: reboot_required.rc != 0
      register: reboot_done

    - name: Consolidar resultado por host
      ansible.builtin.set_fact:
        patch_report:
          hostname: "{{ inventory_hostname }}"
          updates_before: "{{ updates_before.stdout_lines | default([]) }}"
          updates_after: "{{ updates_after.stdout_lines | default([]) }}"
          packages_changed: "{{ dnf_result.changed }}"
          reboot_performed: "{{ reboot_done is defined and reboot_done is changed }}"