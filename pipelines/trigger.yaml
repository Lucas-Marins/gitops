---
apiVersion: triggers.tekton.dev/v1beta1
kind: EventListener
metadata:
  name: github-listener
spec:
  serviceAccountName: pipeline
  triggers:
    - name: maven-push-trigger
      interceptors:
        - ref:
            name: cel
          params:
            - name: filter
              value: "body.ref == 'refs/heads/maven'"
      bindings:
        - ref: github-push-binding
      template:
        ref: hello-java-trigger-template
---
apiVersion: triggers.tekton.dev/v1beta1
kind: TriggerTemplate
metadata:
  name: hello-java-trigger-template
spec:
  params:
    - name: git-url
    - name: git-revision
  resourcetemplates:
    - apiVersion: tekton.dev/v1
      kind: PipelineRun
      metadata:
        generateName: new-pipeline-run-
      spec:
        pipelineRef:
          name: new-pipeline
        params:
          - name: git-url
            value: $(tt.params.git-url)
          - name: git-revision
            value: $(tt.params.git-revision)
          - name: image-tag
            value: $(tt.params.git-revision)
        workspaces:
          - name: workshop
            persistentVolumeClaim:
               claimName: app-hello-java
            
            # Se quiser criar um novo PVC para cada PipelineRun, descomente a seção abaixo e comente a seção acima.
            # volumeClaimTemplate:
            #   spec:
            #     accessModes: ["ReadWriteOnce"]
            #     resources:
            #       requests:
            #         storage: 2Gi

        serviceAccountName: pipeline
---
apiVersion: triggers.tekton.dev/v1beta1
kind: TriggerBinding
metadata:
  name: github-push-binding
  namespace: hello-java
spec:
  params:
    - name: git-url
      value: $(body.repository.clone_url)
    - name: git-revision
      value: $(body.head_commit.id)