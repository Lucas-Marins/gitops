apiVersion: cdi.kubevirt.io/v1beta1
kind: DataVolume
metadata:
  name: example
  labels:
    instancetype.kubevirt.io/default-instancetype: u1.medium
    instancetype.kubevirt.io/default-preference: fedora
  annotations:
    cdi.kubevirt.io/storage.bind.immediate.requested: 'true'
  namespace: default
spec:
  source:
    registry:
      url: https://dl.fedoraproject.org/pub/fedora/linux/releases/39/Cloud/x86_64/images/Fedora-Cloud-Base-39-1.5.x86_64.qcow2
  storage:
    resources:
      requests:
        storage: 30Gi
