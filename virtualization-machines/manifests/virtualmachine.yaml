apiVersion: kubevirt.io/v1
kind: VirtualMachine
metadata:
  name: vm-lucas
  namespace: virt-manage
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  dataVolumeTemplates:
    - metadata:
        name: vm-lucas
      spec:
        sourceRef:
          kind: DataSource
          name: vm-lucas
          namespace: openshift-virtualization-os-images
        storage:
          accessModes:
            - ReadWriteOnce
          resources:
            requests:
              storage: 10Gi
          storageClassName: nfs-storage
  instancetype:
    name: u1.small
  preference:
    name: vm-lucas
  runStrategy: Manual
  template:
    metadata:
      labels:
        network.kubevirt.io/headlessService: headless
    spec:
      domain:
        devices:
          autoattachPodInterface: false
          disks: []
          interfaces:
            - masquerade: {}
              name: default
      networks:
        - name: default
          pod: {}
      subdomain: headless
      volumes:
        - dataVolume:
            name: vm-lucas
          name: rootdisk
